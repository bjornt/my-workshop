name: Tests

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.23"
                  check-latest: true

            - name: Verify formatting
              run: test -z "$(gofmt -l .)"

            - name: Vet
              run: go vet ./...

            - name: Build
              run: go build ./...

            - name: Run tests
              run: go test ./...
