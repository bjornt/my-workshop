name: Tests

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Set up Go
              uses: actions/setup-go@v7
              with:
                  go-version: "1.23"
                  check-latest: true

            - name: Verify formatting
              run: test -z "$(gofmt -l .)"

            - name: Vet
              run: go vet ./...

            - name: Build
              run: go build ./...

            - name: Run tests
              run: go test ./...
