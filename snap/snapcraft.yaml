name: my-workshop
title: my-workshop
base: core26
version: 0.1.0
summary: Bootstrap, ignore, and start a workshop development environment
description: |
  my-workshop wraps the standard workshop launch flow so a project's
  git-tracked workshop.yaml can be augmented with the SDKs, copies, and
  connections you need — without those local additions ever showing up in
  git status, getting committed, or being pushed.

  This snap bundles my-workshop only. At run time it shells out to the
  host's `workshop` and `git` commands (classic confinement is required so
  it can read and write project files and reach those tools on PATH).

contact: https://github.com/bjornt/my-workshop/issues
issues: https://github.com/bjornt/my-workshop/issues
source-code: https://github.com/bjornt/my-workshop
website: https://github.com/bjornt/my-workshop
license: GPL-3.0-only
grade: stable
confinement: classic

apps:
  my-workshop:
    # Entry-point script the python plugin installs into $SNAP/bin.
    command: bin/my-workshop
    environment:
      # Prefer the snap's bundled interpreter/binaries, but keep the host on
      # PATH so the `workshop` and `git` commands remain reachable.
      PATH: $SNAP/bin:$SNAP/usr/bin:$PATH

parts:
  my-workshop:
    plugin: python
    source: .
    # The project declares no runtime dependencies; only the package itself
    # is installed from pyproject.toml via `pip install .`.
    python-requirements: []
    build-packages:
      - python3-venv
      - python3-pip
    # core26 does not ship a Python interpreter in the base snap. Stage both
    # Python and its venv/ensurepip support because the python plugin creates
    # the install venv from the staged interpreter.
    stage-packages:
      - python3
      - python3-venv
    # Classic confinement: patch staged ELF binaries to load libraries from
    # the base snap rather than the host root filesystem.
    build-attributes:
      - enable-patchelf
